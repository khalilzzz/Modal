# @package _global_
# MViT / MViTv2 — Multiscale Vision Transformer for Track B (open world).
# Pick the variant via `model_id` below. Known HuggingFace checkpoints:
#
#   facebook/mvit-base-finetuned-ssv2    Base  (~36M params, ~67% SSv2)
#   facebook/mvit-large-finetuned-ssv2   Large (~213M params, if available)
#
# For MViTv2 specifically, some variants are only on PyTorchVideo / official
# repo and not on HuggingFace — they would need a different wrapper.
model:
  name: b_mvitv2
  pretrained: true                 # Track B: always use pretrained weights
  num_classes: ${num_classes}

  model_id: facebook/mvit-base-finetuned-ssv2

  # Inference geometry — must match the chosen checkpoint:
  #   Base: 16 frames at 224x224.
  #   Large: usually 32-40 frames at 224x224 — check the HF model card.
  num_frames: 4                    # dataset value; replicated to native inside the wrapper
  image_size: 224

  # Set true to train only the classifier head (fast, cheap, decent baseline).
  freeze_backbone: false

  # Set true for the Large variant if you hit OOM. Base usually fits without it.
  use_gradient_checkpointing: false
