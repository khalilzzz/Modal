# @package _global_
# Track B (open world): TimeSformer base, fine-tuned on Something-Something V2.
# Source: https://huggingface.co/facebook/timesformer-base-finetuned-ssv2
# Uses divided space-time attention.
model:
  name: b_timesformer
  pretrained: true
  num_classes: ${num_classes}
  # HuggingFace checkpoint. Alternative: facebook/timesformer-hr-finetuned-ssv2 (higher resolution).
  model_id: facebook/timesformer-base-finetuned-ssv2
  # Native frame count for this checkpoint. Match dataset.num_frames if you change it.
  num_frames: 8
  freeze_backbone: false
